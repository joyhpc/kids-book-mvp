<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:#000}
body{transition:background 2s ease}

/* ═══ Canvas 粒子层 ═══ */
#particles{position:fixed;inset:0;z-index:1;pointer-events:none}

/* ═══ SVG 场景层 ═══ */
#svg-scene{position:fixed;bottom:0;left:0;width:100%;height:35vh;z-index:2;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:.85;transition:opacity 1.2s ease;pointer-events:auto}
#svg-scene svg{width:100%;max-height:100%;display:block}

/* ═══ 3D 视差容器 ═══ */
#parallax{position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  perspective:1200px;transform-style:preserve-3d;pointer-events:none}

/* ═══ 毛玻璃阅读面板 ═══ */
#panel{position:relative;width:min(88vw,680px);max-height:72vh;
  padding:2.4rem 2.8rem;overflow-y:auto;pointer-events:auto;
  background:rgba(10,15,25,0.65);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(212,175,55,0.08);border-radius:12px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.04),0 30px 80px rgba(0,0,0,0.6);
  transform:translateZ(40px);transition:opacity .6s ease,transform .6s ease}
#panel.hidden{opacity:0;transform:translateZ(40px) translateY(24px);pointer-events:none}

#chapter-label{font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;color:#d4af37;margin-bottom:1.2rem;
  opacity:.7}

#text-en{font-family:'Playfair Display',Georgia,serif;font-size:1.45rem;line-height:1.9;
  color:rgba(255,255,255,0.92);text-shadow:0 2px 8px rgba(0,0,0,0.6);
  margin-bottom:1.4rem;min-height:2em}

#text-zh{font-family:'Nunito','PingFang SC','Microsoft YaHei',sans-serif;
  font-size:.95rem;line-height:1.8;color:rgba(255,255,255,0.38);
  letter-spacing:.04em;margin-bottom:1rem}

#author-note{font-family:'Nunito',sans-serif;font-size:.72rem;
  color:rgba(212,175,55,0.45);letter-spacing:.12em;text-align:right;
  font-style:italic}

/* ═══ 打字机光标 ═══ */
.cursor{display:inline-block;width:2px;height:1.2em;background:#d4af37;
  margin-left:2px;vertical-align:text-bottom;
  animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ═══ 底部导航 ═══ */
#nav{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%);z-index:20;pointer-events:auto;
  display:flex;align-items:center;gap:16px}
.nav-btn{width:44px;height:44px;border-radius:50%;border:1px solid rgba(212,175,55,0.15);
  background:rgba(10,15,25,0.5);backdrop-filter:blur(10px);
  color:rgba(255,255,255,0.7);font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s ease;-webkit-backdrop-filter:blur(10px)}
.nav-btn:hover{border-color:rgba(212,175,55,0.4);color:#d4af37;
  box-shadow:0 0 20px rgba(212,175,55,0.15)}
.nav-btn:active{transform:scale(.92)}
#dots{display:flex;gap:8px}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.2);
  transition:all .4s ease;cursor:pointer}
.dot.active{background:#d4af37;box-shadow:0 0 8px rgba(212,175,55,0.5);
  transform:scale(1.4)}

/* ═══ 音频开关 ═══ */
#audio-btn{position:fixed;top:20px;right:20px;z-index:20;

/* ================================================================
   WEB AUDIO API
   ================================================================ */
let actx = null, drone1 = null, drone2 = null, droneGain = null;
let windSrc = null, windGain = null;

function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  droneGain = actx.createGain();
  droneGain.gain.value = 0;
  droneGain.connect(actx.destination);

  windGain = actx.createGain();
  windGain.gain.value = 0;
  const lp = actx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 400; lp.Q.value = 1;
  windGain.connect(lp); lp.connect(actx.destination);

  const buf = actx.createBuffer(1, actx.sampleRate * 4, actx.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < ch.length; i++) ch[i] = Math.random() * 2 - 1;
  windSrc = actx.createBufferSource();
  windSrc.buffer = buf; windSrc.loop = true;
  windSrc.connect(windGain); windSrc.start();
}

function playDrone(f1, f2) {
  if (!actx || !audioOn) return;
  const t = actx.currentTime;
  if (drone1) { drone1.stop(t + 0.05); drone2.stop(t + 0.05); }
  droneGain.gain.setTargetAtTime(0, t, 0.3);
  drone1 = actx.createOscillator(); drone1.type = 'sine'; drone1.frequency.value = f1;
  drone2 = actx.createOscillator(); drone2.type = 'sine'; drone2.frequency.value = f2;
  const g1 = actx.createGain(); g1.gain.value = 0.06;
  const g2 = actx.createGain(); g2.gain.value = 0.04;
  drone1.connect(g1); g1.connect(droneGain);
  drone2.connect(g2); g2.connect(droneGain);
  drone1.start(t + 0.4); drone2.start(t + 0.4);
  droneGain.gain.setTargetAtTime(1, t + 0.5, 1.5);
  windGain.gain.setTargetAtTime(0.015, t + 0.5, 2);
}

function stopDrone() {
  if (!actx) return;
  const t = actx.currentTime;
  droneGain.gain.setTargetAtTime(0, t, 0.8);
  windGain.gain.setTargetAtTime(0, t, 0.8);
}

window.playChime = function(yNorm) {
  if (!actx || !audioOn) return;
  const idx = Math.min(pentatonic.length - 1, Math.floor(yNorm * pentatonic.length));
  const freq = pentatonic[idx];
  const t = actx.currentTime;
  const osc = actx.createOscillator();
  osc.type = 'sine'; osc.frequency.value = freq;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.18, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
  osc.connect(g); g.connect(actx.destination);
  osc.start(t); osc.stop(t + 1.3);
};

function createParticle(mode, color) {
  const w = cvs.width, h = cvs.height;
  const p = { x: Math.random() * w, y: Math.random() * h,
              size: Math.random() * 2.2 + 0.5, alpha: Math.random(),
              dAlpha: (Math.random() * 0.012 + 0.003) * (Math.random() > 0.5 ? 1 : -1),
              color, life: 999 };
  switch (mode) {
    case 'snow':
      p.vx = (Math.random() - 0.5) * 0.3;
      p.vy = Math.random() * 0.6 + 0.15;
      p.connect = false; break;
    case 'magic':
      p.vx = (Math.random() - 0.5) * 0.4;
      p.vy = -(Math.random() * 0.5 + 0.1);
      p.connect = false; p.dAlpha = Math.abs(p.dAlpha) * 2; break;
    case 'ashes':
      p.vx = (Math.random() - 0.5) * 0.15;
      p.vy = Math.random() * 0.2 + 0.05;
      p.connect = false; p.size *= 0.7; break;
    case 'fireflies':
      p.vx = (Math.random() - 0.5) * 0.3;
      p.vy = (Math.random() - 0.5) * 0.3;
      p.connect = false; p.size = Math.random() * 3 + 1;
      p.dAlpha = (Math.random() * 0.03 + 0.01) * (Math.random() > 0.5 ? 1 : -1); break;
    default: // stars
      p.vx = (Math.random() - 0.5) * 0.25;
      p.vy = (Math.random() - 0.5) * 0.25;
      p.connect = true; break;
  }
  return p;
}

function initParticles(mode, color) {
  pMode = mode; pColor = color;
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(createParticle(mode, color));
}

function updateParticles() {
  const w = cvs.width, h = cvs.height;
  particles.forEach(p => {
    const dx = p.x - mouse.x, dy = p.y - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < MOUSE_RADIUS && dist > 0) {
      const force = (MOUSE_RADIUS - dist) / MOUSE_RADIUS * 0.8;
      p.vx += (dx / dist) * force;
      p.vy += (dy / dist) * force;
    }
    p.vx *= 0.98; p.vy *= 0.98;
    p.x += p.vx; p.y += p.vy;
    p.alpha += p.dAlpha;
    if (p.alpha > 1 || p.alpha < 0.05) p.dAlpha *= -1;
    p.alpha = Math.max(0.05, Math.min(1, p.alpha));
    if (p.x < -20) p.x = w + 20;
    if (p.x > w + 20) p.x = -20;
    if (p.y < -20) p.y = h + 20;
    if (p.y > h + 20) p.y = -20;
    if (p.life < 999) { p.life -= 0.015; if (p.life <= 0) p.alpha = 0; }
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, cvs.width, cvs.height);
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    if (p.alpha <= 0) continue;
    ctx.save();
    ctx.globalAlpha = p.alpha * 0.7;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = p.size * 3;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    if (p.connect) {
      for (let j = i + 1; j < particles.length; j++) {
        const q = particles[j];
        if (!q.connect) continue;
        const d = Math.hypot(p.x - q.x, p.y - q.y);
        if (d < CONNECT_DIST) {
          ctx.save();
          ctx.globalAlpha = (1 - d / CONNECT_DIST) * 0.12 * Math.min(p.alpha, q.alpha);
          ctx.strokeStyle = p.color;
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);
          ctx.stroke();
          ctx.restore();
        }
      }
    }
  }
}

function supernova(sx, sy) {
  const colors = ['#FFD700', '#FFA500', '#FF6347', '#FFFFFF', pColor];
  for (let i = 0; i < 60; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 5 + 1;
    const p = createParticle(pMode, colors[Math.floor(Math.random() * colors.length)]);
    p.x = sx; p.y = sy;
    p.vx = Math.cos(angle) * speed;
    p.vy = Math.sin(angle) * speed;
    p.size = Math.random() * 3 + 1;
    p.life = 1; p.connect = false;
    particles.push(p);
  }
}

function animLoop() {
  updateParticles();
  drawParticles();
  requestAnimationFrame(animLoop);
}

/* ================================================================
   PARALLAX 3D
   ================================================================ */
function applyParallax(rx, ry) {
  parallax.style.transform =
    `rotateX(${rx}deg) rotateY(${ry}deg)`;
}

document.addEventListener('mousemove', e => {
  const nx = (e.clientX / window.innerWidth - 0.5) * 2;
  const ny = (e.clientY / window.innerHeight - 0.5) * 2;
  applyParallax(-ny * 1.8, nx * 1.8);
  mouse.x = e.clientX; mouse.y = e.clientY;
});

window.addEventListener('deviceorientation', e => {
  if (e.gamma == null) return;
  applyParallax(
    Math.max(-8, Math.min(8, e.beta * 0.15)),
    Math.max(-8, Math.min(8, e.gamma * 0.15))
  );
});

/* ================================================================
   TYPEWRITER
   ================================================================ */
function typewrite(el, text, speed, cb) {
  if (typeTimer) clearTimeout(typeTimer);
  el.innerHTML = '';
  typing = true;
  let i = 0;
  const cursor = document.createElement('span');
  cursor.className = 'cursor';

  function next() {
    if (i < text.length) {
      el.textContent = text.slice(0, i + 1);
      el.appendChild(cursor);
      i++;
      const jitter = speed + (Math.random() - 0.5) * speed * 0.6;
      typeTimer = setTimeout(next, Math.max(15, jitter));
    } else {
      typing = false;
      setTimeout(() => { if (cursor.parentNode) cursor.remove(); }, 2500);
      if (cb) cb();
    }
  }
  next();
}

/* ================================================================
   CHAPTER NAVIGATION
   ================================================================ */
function buildDots() {
  dotsBox.innerHTML = '';
  chapters.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === cur ? ' active' : '');
    d.addEventListener('click', () => showChapter(i));
    dotsBox.appendChild(d);
  });
}

function showChapter(idx) {
  if (idx < 0 || idx >= chapters.length || (idx === cur && !panel.classList.contains('hidden') === false)) return;
  cur = idx;
  const ch = chapters[cur];

  panel.classList.add('hidden');

  setTimeout(() => {
    document.body.style.background = ch.bg;
    svgBox.innerHTML = svgScenes[cur] || '';
    initParticles(ch.mode, ch.pColor);

    elLabel.textContent = ch.author;
    elZh.textContent = ch.zh;
    elAuthor.textContent = '— Antoine de Saint-Exupéry';

    panel.classList.remove('hidden');

    typewrite(elEn, ch.en, 48, () => {});

    if (audioOn) playDrone(chords[cur][0], chords[cur][1]);

    document.querySelectorAll('.dot').forEach((d, i) =>
      d.classList.toggle('active', i === cur));
  }, 500);
}

document.getElementById('prev-btn').addEventListener('click', () => {
  if (cur > 0) showChapter(cur - 1);
});
document.getElementById('next-btn').addEventListener('click', () => {
  if (cur < chapters.length - 1) showChapter(cur + 1);
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    if (cur < chapters.length - 1) showChapter(cur + 1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    if (cur > 0) showChapter(cur - 1);
  }
});

/* touch swipe */
let tx0 = 0;
document.addEventListener('touchstart', e => { tx0 = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx0;
  if (Math.abs(dx) > 60) {
    if (dx < 0 && cur < chapters.length - 1) showChapter(cur + 1);
    if (dx > 0 && cur > 0) showChapter(cur - 1);
  }
});

/* click supernova + chime */
document.addEventListener('click', e => {
  if (e.target.closest('#nav') || e.target.closest('#audio-btn') || e.target.closest('#panel')) return;
  supernova(e.clientX, e.clientY);
  const yNorm = e.clientY / window.innerHeight;
  playChime(yNorm);
});

/* ═══ AUDIO TOGGLE ═══ */
const audioBtn = document.getElementById('audio-btn');
audioBtn.addEventListener('click', () => {
  initAudio();
  audioOn = !audioOn;
  audioBtn.classList.toggle('muted', !audioOn);
  audioBtn.textContent = audioOn ? '♫' : '♪';
  if (audioOn) {
    if (actx.state === 'suspended') actx.resume();
    playDrone(chords[cur][0], chords[cur][1]);
  } else {
    stopDrone();
  }
});

/* ═══ BOOT ═══ */
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
buildDots();
initParticles(chapters[0].mode, chapters[0].pColor);
animLoop();
showChapter(0);
</script>
