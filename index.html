<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>小王子喂狐狸 | Interactive Storybook</title>

  <!-- 绘本字体：Nunito（儿童友好）+ Playfair Display（高级感标题） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 魔法加载画面 -->
  <div id="loading-screen">
    <div class="loader-ring"></div>
    <div class="loading-text">魔法绘本加载中…</div>
  </div>

  <!-- 舞台主容器：所有场景元素由 JS 动态渲染 -->
  <div id="stage">
    <!-- 全屏 Canvas 粒子背景（最底层） -->
    <canvas id="bg-canvas"></canvas>
    <!-- 阅读区：文字占 1/4+ 屏高，原文+译文，有声播放 -->
    <div id="reading-zone">
      <button id="audio-btn" class="hidden" type="button" aria-label="播放朗读">🔊</button>
      <div id="subtitle-panel"></div>
    </div>
    <!-- 底部操作提示 -->
    <div id="hint-bar"></div>
    <!-- 章节完成覆盖层 -->
    <div id="ending-overlay">
      <div class="ending-card">
        <div class="ending-stars" aria-hidden="true"></div>
        <div class="ending-title-en"></div>
        <div class="ending-title-zh"></div>
        <div class="ending-subtitle"></div>
        <button class="ending-btn"></button>
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "core/": "./js/core/",
      "modules/": "./js/modules/",
      "plugins/": "./js/plugins/",
      "utils/": "./js/utils/"
    }
  }
  </script>
  <!-- file:// 协议兼容：预加载场景数据（由于使用了原生 ESM，后续必须通过本地服务器运行才能正常加载模块） -->
  <script src="data/scene.js"></script>
  <!-- 引擎入口 -->
  <script type="module" src="js/engine.js"></script>
</body>
</html>
