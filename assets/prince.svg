<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Muted Earth Tones -->
    <linearGradient id="earth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- The Stoic, Unreachable Idol -->
  <!-- A rigid, immovable monolith comparing to the fluid, dissolving mermaid -->
  <rect x="35" y="25" width="30" height="65" fill="url(#earth)" rx="3" filter="url(#glow)"/>
  <!-- Faceless, disconnected head -->
  <circle cx="50" cy="15" r="9" fill="#94a3b8" filter="url(#glow)"/>
</svg>