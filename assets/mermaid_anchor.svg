<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- fluid upper body -->
    <linearGradient id="fluidBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(100, 200, 255, 0.9)" />
      <stop offset="100%" stop-color="rgba(50, 150, 255, 0.4)" />
    </linearGradient>
    
    <!-- crystal tail -->
    <linearGradient id="crystalTail" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7eb3" />
      <stop offset="100%" stop-color="#ff758c" />
    </linearGradient>
  </defs>

  <!-- tail -->
  <polygon points="100,100 60,140 80,150 50,190 100,170 150,190 120,150 140,140" fill="url(#crystalTail)" stroke="#fff" stroke-width="2" />
  <polygon points="100,100 80,120 100,140 120,120" fill="rgba(255,255,255,0.4)" />

  <!-- upper body -->
  <path d="M 100 100 C 70 100, 70 50, 100 30 C 130 50, 130 100, 100 100 Z" fill="url(#fluidBody)" />
  
  <!-- face -->
  <circle cx="100" cy="40" r="15" fill="#a0e0ff" opacity="0.8" />
  <circle cx="95" cy="38" r="2" fill="#fff" />
  <circle cx="105" cy="38" r="2" fill="#fff" />
  
  <!-- hair -->
  <path d="M 100 25 C 80 15, 60 40, 75 60 C 85 45, 90 30, 100 25 Z" fill="#64c8ff" opacity="0.6" />
  <path d="M 100 25 C 120 15, 140 40, 125 60 C 115 45, 110 30, 100 25 Z" fill="#64c8ff" opacity="0.6" />
</svg>