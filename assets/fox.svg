<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Picasso / Cubist Fox: geometric deconstruction, multi-perspective, bold color planes -->

  <!-- body: angular trapezoid -->
  <polygon points="60,170 140,170 155,105 45,105" fill="#E8722A" stroke="#2B1810" stroke-width="2"/>
  <!-- chest: overlapping geometric white plane -->
  <polygon points="78,170 122,170 130,125 70,125" fill="#F5E6D0" stroke="#2B1810" stroke-width="1.5"/>

  <!-- head: asymmetric cubist construction -->
  <polygon points="55,108 100,38 145,108" fill="#D4651E" stroke="#2B1810" stroke-width="2"/>
  <!-- face plane shift (dual perspective) -->
  <polygon points="72,108 100,52 100,108" fill="#F09844" stroke="#2B1810" stroke-width="1"/>
  <polygon points="100,108 100,52 128,108" fill="#C05A18" stroke="#2B1810" stroke-width="1"/>

  <!-- left ear: sharp triangle -->
  <polygon points="58,72 72,22 86,68" fill="#E8722A" stroke="#2B1810" stroke-width="2"/>
  <polygon points="65,65 73,34 81,62" fill="#FCCB8F" stroke="none"/>

  <!-- right ear: different angle (cubist asymmetry) -->
  <polygon points="114,68 132,18 142,72" fill="#D4651E" stroke="#2B1810" stroke-width="2"/>
  <polygon points="120,64 132,30 137,66" fill="#F5D4A8" stroke="none"/>

  <!-- eyes: different shapes (cubist dual-perspective) -->
  <!-- left eye: diamond -->
  <polygon points="80,78 88,70 96,78 88,86" fill="#FFF8E8" stroke="#2B1810" stroke-width="1.5"/>
  <circle cx="88" cy="78" r="3.5" fill="#1A1A2E"/>
  <!-- right eye: circle (different perspective) -->
  <circle cx="118" cy="76" r="9" fill="#FFF8E8" stroke="#2B1810" stroke-width="1.5"/>
  <circle cx="119" cy="75" r="4" fill="#1A1A2E"/>

  <!-- nose: angular -->
  <polygon points="96,92 104,92 100,100" fill="#1A1A2E"/>

  <!-- mouth: minimal cubist line -->
  <path d="M92 100 Q100 108 108 100" fill="none" stroke="#2B1810" stroke-width="1.5" stroke-linecap="round"/>

  <!-- tail: bold sweeping geometric shape -->
  <path d="M45,135 Q10,100 18,70 Q24,60 32,75 Q40,100 50,125" fill="#E8722A" stroke="#2B1810" stroke-width="2"/>
  <path d="M18,70 Q22,64 28,72 Q35,90 40,110" fill="#F5E6D0" stroke="none"/>

  <!-- legs: angular blocks -->
  <rect x="68" y="164" width="18" height="20" rx="3" fill="#D4651E" stroke="#2B1810" stroke-width="1.5"/>
  <rect x="114" y="164" width="18" height="20" rx="3" fill="#C05A18" stroke="#2B1810" stroke-width="1.5"/>

  <!-- cubist accent: color plane fragments -->
  <polygon points="62,130 78,118 85,140" fill="#F9BE6C" opacity="0.6"/>
  <polygon points="115,118 138,130 125,142" fill="#A0461A" opacity="0.5"/>

  <!-- whiskers: minimal lines -->
  <line x1="65" y1="88" x2="88" y2="90" stroke="#2B1810" stroke-width="1" opacity="0.5"/>
  <line x1="62" y1="95" x2="86" y2="94" stroke="#2B1810" stroke-width="1" opacity="0.5"/>
  <line x1="112" y1="90" x2="140" y2="86" stroke="#2B1810" stroke-width="1" opacity="0.5"/>
  <line x1="114" y1="95" x2="142" y2="92" stroke="#2B1810" stroke-width="1" opacity="0.5"/>
</svg>
