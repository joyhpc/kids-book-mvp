<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Desaturated cold colors -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Visual poetry: A solitary sharp triangular silhouette -->
  <!-- A stark contrast to the organic flow of the sea -->
  <polygon points="50,15 85,75 15,75" fill="#0f172a" opacity="0.85" filter="url(#glow)"/>
  <line x1="5" y1="75" x2="95" y2="75" stroke="#cbd5e1" stroke-width="1.5" opacity="0.6"/>
</svg>