<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200">
  <!-- Cubist Robot: hard angles, metallic planes -->
  <!-- antenna -->
  <line x1="80" y1="10" x2="80" y2="35" stroke="#8E8E8E" stroke-width="3"/>
  <circle cx="80" cy="8" r="6" fill="#FF5252" stroke="#C62828" stroke-width="1.5"/>
  <!-- head -->
  <rect x="42" y="35" width="76" height="55" rx="6" fill="#78909C" stroke="#37474F" stroke-width="2"/>
  <rect x="42" y="35" width="38" height="55" rx="6" fill="#90A4AE" stroke="none"/>
  <!-- eyes: asymmetric cubist -->
  <rect x="52" y="50" width="20" height="16" rx="3" fill="#E0F7FA" stroke="#37474F" stroke-width="1.5"/>
  <circle cx="62" cy="58" r="4" fill="#00BCD4"/>
  <circle cx="105" cy="58" r="12" fill="#E0F7FA" stroke="#37474F" stroke-width="1.5"/>
  <circle cx="106" cy="57" r="5" fill="#FF9800"/>
  <!-- mouth: LED grid -->
  <rect x="58" y="76" width="44" height="8" rx="2" fill="#263238"/>
  <rect x="62" y="78" width="6" height="4" rx="1" fill="#76FF03"/>
  <rect x="72" y="78" width="6" height="4" rx="1" fill="#76FF03"/>
  <rect x="82" y="78" width="6" height="4" rx="1" fill="#76FF03"/>
  <rect x="92" y="78" width="6" height="4" rx="1" fill="#76FF03"/>
  <!-- body -->
  <polygon points="35,95 125,95 135,170 25,170" fill="#607D8B" stroke="#37474F" stroke-width="2"/>
  <polygon points="35,95 80,95 80,170 25,170" fill="#78909C" stroke="none"/>
  <!-- chest panel -->
  <rect x="55" y="110" width="50" height="35" rx="4" fill="#37474F" stroke="#263238" stroke-width="1"/>
  <circle cx="70" cy="122" r="5" fill="#F44336"/>
  <circle cx="90" cy="122" r="5" fill="#4CAF50"/>
  <rect x="62" y="132" width="36" height="8" rx="2" fill="#FFC107"/>
  <!-- arms: angular -->
  <rect x="10" y="100" width="22" height="50" rx="4" fill="#78909C" stroke="#37474F" stroke-width="2"/>
  <rect x="128" y="100" width="22" height="50" rx="4" fill="#607D8B" stroke="#37474F" stroke-width="2"/>
  <!-- legs -->
  <rect x="38" y="168" width="28" height="28" rx="4" fill="#546E7A" stroke="#37474F" stroke-width="2"/>
  <rect x="94" y="168" width="28" height="28" rx="4" fill="#607D8B" stroke="#37474F" stroke-width="2"/>
</svg>
