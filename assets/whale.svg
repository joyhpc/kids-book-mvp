<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160">
  <!-- Cubist Whale: geometric planes, angular body -->
  <ellipse cx="130" cy="90" rx="95" ry="52" fill="#2E5C8A" stroke="#1A2E44" stroke-width="2"/>
  <polygon points="40,65 130,50 130,90 50,90" fill="#4A8EC2" stroke="#1A2E44" stroke-width="1"/>
  <polygon points="130,50 130,130 220,90" fill="#1E4468" stroke="#1A2E44" stroke-width="1"/>
  <!-- tail: angular fork -->
  <polygon points="218,72 240,40 232,85" fill="#2E5C8A" stroke="#1A2E44" stroke-width="2"/>
  <polygon points="218,105 240,138 232,92" fill="#4A8EC2" stroke="#1A2E44" stroke-width="2"/>
  <!-- belly -->
  <ellipse cx="120" cy="108" rx="60" ry="22" fill="#B8D8F0" stroke="#1A2E44" stroke-width="1"/>
  <!-- eye: cubist diamond -->
  <polygon points="70,76 80,68 90,76 80,84" fill="#FFF" stroke="#1A2E44" stroke-width="1.5"/>
  <circle cx="80" cy="76" r="4" fill="#1A1A2E"/>
  <!-- smile -->
  <path d="M60 94 Q80 106 100 94" fill="none" stroke="#1A2E44" stroke-width="1.8" stroke-linecap="round"/>
  <!-- spout -->
  <path d="M92 50 Q88 30 82 18 M92 50 Q96 28 102 18" fill="none" stroke="#6CB4E8" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>
