# ════════════════════════════════════════════
#   第一章：一号作品  |  Chapter 1: Drawing Number One
#   真正原著开篇 · 蟒蛇、大象、大人与飞行员的童年
#   改编自 安托万·德·圣-埃克苏佩里《小王子》第一章
# ════════════════════════════════════════════

book_id: chapter1_the_boa
book_title_zh: "一号作品"
book_title_en: "Drawing Number One"
author: "Antoine de Saint-Exupéry"
target_age: "4-8"
theme: night_sky
font_family: Nunito

scenes:

  # ──────────────────────────────────────────
  # 场景 1：书里的图画 · The Picture in the Book
  # 叙事：六岁时在《真实的故事》里看到的插图
  # ──────────────────────────────────────────
  - id: ch1_s1_book
    title_zh: 书里的图画
    title_en: The Picture in the Book
    background_override:
      type: canvas
      gradient: "radial-gradient(ellipse at 50% 60%, #1a1005 0%, #100a02 50%, #080401 100%)"
      particles: true
    dialogue_text: '"Once when I was six years old I saw a magnificent picture in a book. It was a picture of a boa constrictor in the act of swallowing an animal."'
    dialogue_text_fr: "Lorsque j'avais six ans j'ai vu, une fois, une magnifique image dans un livre. Ça représentait un serpent boa qui avalait un fauve."
    dialogue_text_zh: "\u201c六岁那年，我曾在一本书里看到一幅绝妙的插图。画的是一条正在吞食野兽的蟒蛇。\u201d"
    characters: []
    items:
      - id: snake_pic
        img_src: assets/snake.svg
        label: Boa Constrictor
        position: { x: "50%", y: "45%" }
        width: "120px"
        height: "80px"
        animation: float-gentle
    ending:
      auto_advance: true
      delay_after_success_ms: 7000

  # ──────────────────────────────────────────
  # 场景 2：一号作品 · Drawing Number One
  # 叙事：我画下了我的第一幅画，拿给大人看
  # ──────────────────────────────────────────
  - id: ch1_s2_drawing1
    title_zh: 一号作品
    title_en: Drawing Number One
    background_override:
      type: canvas
      gradient: "radial-gradient(ellipse at 50% 50%, #141228 0%, #0d0a1e 50%, #060412 100%)"
      particles: true
    dialogue_text: '"I showed my masterpiece to the grown-ups, and asked them whether the drawing frightened them."'
    dialogue_text_fr: "J'ai montré mon chef-d'œuvre aux grandes personnes, et je leur ai demandé si mon dessin leur faisait peur."
    dialogue_text_zh: "\u201c我把我的杰作拿给大人看，问他们我的画是不是让他们感到害怕。\u201d"
    characters: []
    items:
      - id: drawing1
        img_src: assets/hat_drawing.svg
        label: Drawing No 1
        position: { x: "50%", y: "50%" }
        width: "160px"
        height: "80px"
    ending:
      auto_advance: true
      delay_after_success_ms: 6000

  # ──────────────────────────────────────────
  # 场景 3：这只是一顶帽子 · It Is Only a Hat
  # 叙事：大人们无法理解，以为那是帽子
  # ──────────────────────────────────────────
  - id: ch1_s3_adult_reply
    title_zh: 大人的回答
    title_en: The Adult's Reply
    background_override:
      type: canvas
      gradient: "radial-gradient(ellipse at 50% 40%, #181c20 0%, #101215 50%, #08090a 100%)"
      particles: true
    dialogue_text: '"But they answered: Frighten? Why should any one be frightened by a hat? My drawing was not a picture of a hat."'
    dialogue_text_fr: "Elles m'ont répondu : « Pourquoi un chapeau ferait-il peur ? » Mon dessin ne représentait pas un chapeau."
    dialogue_text_zh: "\u201c但他们回答：‘一顶帽子有什么好怕的？’可我的画并不是一顶帽子。\u201d"
    characters:
      - id: adult1
        img_src: assets/adult.svg
        label: Grown-up
        position: { x: "70%", y: "45%" }
        width: "80px"
        height: "140px"
    items:
      - id: drawing_hat
        img_src: assets/hat_drawing.svg
        label: Hat
        position: { x: "30%", y: "50%" }
        width: "120px"
        height: "60px"
    ending:
      auto_advance: true
      delay_after_success_ms: 6500

  # ──────────────────────────────────────────
  # 场景 4：二号作品 · Drawing Number Two
  # 叙事：于是画了蟒蛇内部
  # ──────────────────────────────────────────
  - id: ch1_s4_drawing2
    title_zh: 二号作品
    title_en: Drawing Number Two
    background_override:
      type: canvas
      gradient: "radial-gradient(ellipse at 50% 60%, #1a1020 0%, #120818 40%, #08040f 100%)"
      particles: true
    dialogue_text: '"I then drew the inside of the boa constrictor, so that the grown-ups could see it clearly. They always need to have things explained."'
    dialogue_text_fr: "J'ai alors dessiné l'intérieur du serpent boa, afin que les grandes personnes puissent comprendre. Elles ont toujours besoin d'explications."
    dialogue_text_zh: "\u201c于是我又画了蟒蛇的内部，好让大人们能看懂。他们总是需要人解释。\u201d"
    characters: []
    items:
      - id: drawing2
        img_src: assets/elephant_boa.svg
        label: Drawing No 2
        position: { x: "50%", y: "50%" }
        width: "160px"
        height: "80px"
    ending:
      auto_advance: true
      delay_after_success_ms: 7000

  # ──────────────────────────────────────────
  # 场景 5：测试大人（互动） · Testing the Adults
  # 叙事：把一号作品拿给大人测试
  # 交互：拖拽一号作品（帽子）到大人身上
  # ──────────────────────────────────────────
  - id: ch1_s5_test
    title_zh: 遇到大人的测试
    title_en: Testing the Adults
    background_override:
      type: canvas
      gradient: "radial-gradient(ellipse at 50% 50%, #142838 0%, #0c1a26 50%, #060d14 100%)"
      particles: true
    dialogue_text: '"Whenever I met a grown-up who seemed clear-sighted, I tried the experiment of showing him my Drawing Number One."'
    dialogue_text_fr: "Quand j'en rencontrais une qui me paraissait un peu lucide, je faisais l'expérience sur elle de mon dessin numéro 1."
    dialogue_text_zh: "\u201c只要遇到一个看起来稍微明白点事理的人，我就会拿出我的一号作品来测试他。\u201d"
    after_success_text: '"But whoever it was, he would always say: That is a hat."'
    after_success_text_fr: "Mais toujours elle me répondait : « C'est un chapeau. »"
    after_success_text_zh: "\u201c但他总是回答：‘这是一顶帽子。’\u201d"
    characters:
      - id: adult_target
        img_src: assets/adult.svg
        label: Clear-sighted Adult
        position: { x: "75%", y: "45%" }
        width: "100px"
        height: "170px"
        states:
          normal:
            filter: "brightness(1.0)"
            animation: "none"
          responded:
            filter: "grayscale(1) brightness(0.8)"
            animation: "none"
        initial_state: normal
    items:
      - id: drag_drawing1
        img_src: assets/hat_drawing.svg
        label: Drawing 1
        position: { x: "20%", y: "50%" }
        width: "100px"
        height: "50px"
        draggable: true
        animation: item-bounce
    interaction:
      type: drag_and_drop
      draggable_id: drag_drawing1
      target_id: adult_target
      hit_tolerance: 60
      on_fail:
        action: spring_back
        duration_ms: 400
      on_success:
        actions:
          - { type: hide_item, target: drag_drawing1, animation: pop-vanish }
          - { type: change_state, target: adult_target, to_state: responded }
          - { type: play_dialogue, dialogue_id: after_feed }
          - { type: show_particles, emoji: "🎩", count: 8, duration_ms: 1200 }
    ending:
      auto_advance: false
      delay_after_success_ms: 5000

  # ──────────────────────────────────────────
  # 场景 6：孤独的飞行员 · The Lonely Pilot
  # 叙事：飞行员放弃画画，感到孤独，直到遇见小王子
  # ──────────────────────────────────────────
  - id: ch1_s6_alone
    title_zh: 孤独的飞行员
    title_en: The Lonely Pilot
    background_override:
      type: canvas
      gradient: "radial-gradient(ellipse at 50% 90%, #2a1f14 0%, #1a1208 40%, #0d0a05 80%, #050302 100%)"
      particles: true
    dialogue_text: '"So I lived my life alone, without anyone that I could really talk to, until I had an accident in the Sahara Desert..."'
    dialogue_text_fr: "J'ai ainsi vécu seul, sans personne avec qui parler véritablement, jusqu'à une panne dans le désert du Sahara..."
    dialogue_text_zh: "\u201c于是我一直孤独地生活着，没有一个可以真正说话的人，直到我的飞机在撒哈拉沙漠出了故障……\u201d"
    characters: []
    items:
      - id: desert_star1
        img_src: assets/star.svg
        label: Star
        position: { x: "15%", y: "12%" }
        width: "28px"
        height: "28px"
        animation: float-gentle
      - id: desert_star2
        img_src: assets/star.svg
        label: Star
        position: { x: "82%", y: "18%" }
        width: "22px"
        height: "22px"
        animation: float-gentle
    ending:
      auto_advance: false
