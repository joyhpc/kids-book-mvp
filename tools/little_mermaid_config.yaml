book_id: little_mermaid
book_title_zh: "海的女儿"
book_title_en: "The Little Mermaid"
author: "Hans Christian Andersen"
target_age: "4-8"
theme: night_sky
font_family: Nunito

# ==========================================
# 灵魂提取引擎与视觉符号映射器 (Lorebook)
# 抛弃迪士尼套路：提取荣格原型，转化为形状与情绪色彩
# ==========================================
lorebook:
  locations:
    ocean_palace:
      name: "Abyssal Void"
      visual_prompt: "Abyssal depth, oppressive yet vast, extreme negative space, a few towering sharp monolithic structures piercing the darkness, melancholy deep indigo, pure emotion"
      lighting: "dim, ethereal light fading into black"
    ocean_surface:
      name: "Turbulent Divide"
      visual_prompt: "A stark horizontal line dividing two worlds. A turbulent sea, desaturated cold colors, a solitary sharp triangular silhouette of a distant ship, visual poetry"
      lighting: "cold moonlight piercing storm clouds"
    sandy_beach:
      name: "Tragic Shore"
      visual_prompt: "A bleak, beautiful shore. Soft curving coast lines contrasting with harsh reality. Washed out pale colors, a sense of tragic finality, minimalist composition"
      lighting: "pale, washed-out morning light"

  characters:
    mermaid:
      name: "The Martyr (Silenced)"
      visual_prompt: "A fragile conceptual silhouette. Upper body fluid like water, lower body transitioning into sharp fragmented geometric shapes like shattered glass. No mouth, muted deep ocean blue fading to translucent white with a single stroke of crimson."
    prince:
      name: "The Unreachable Idol"
      visual_prompt: "A stoic, distant silhouette of a man. Simple, heavy geometric shapes, unreachable. Muted earth tones."

scenes:
  - id: lm_s1_ocean
    title_zh: 海底宫殿
    title_en: Under the Sea
    # --- AIGC Context ---
    location_id: ocean_palace
    action_prompt: "A solitary silhouette of a tiny, fluid-shaped girl floating in the vastness of the abyss."
    # --------------------
    dialogue_text: "Deep below the ocean waves, the little mermaid lived in a beautiful coral palace."
    dialogue_text_zh: "在深深的海浪之下，小美人鱼住在美丽的珊瑚宫殿里。"
    characters:
      - id: mermaid
        img_src: assets/mermaid.svg
        label: Mermaid
        position: { x: "50%", y: "60%" }
        width: "140px"
        height: "140px"
        animation: float-gentle
    ending:
      auto_advance: true
      delay_after_success_ms: 6000

  - id: lm_s2_surface
    title_zh: 浮出水面
    title_en: The Surface
    # --- AIGC Context ---
    location_id: ocean_surface
    action_prompt: "Looking up from the dark depths towards a distant, unreachable sharp monolithic shape floating on the stark horizon line."
    # --------------------
    dialogue_text: "When she turned fifteen, she swam to the surface and saw a prince on a ship."
    dialogue_text_zh: "当她满十五岁时，她游出水面，看到了一艘船上的王子。"
    characters:
      - id: ship
        img_src: assets/ship.svg
        label: Ship
        position: { x: "70%", y: "45%" }
        width: "220px"
        height: "220px"
        animation: float-gentle
    items:
      - id: mermaid_looking
        img_src: assets/mermaid.svg
        label: Mermaid
        position: { x: "20%", y: "70%" }
        width: "120px"
        height: "120px"
        animation: float-gentle
    ending:
      auto_advance: true
      delay_after_success_ms: 6000

  - id: lm_s3_rescue
    title_zh: 拯救王子
    title_en: Saving the Prince
    # --- AIGC Context ---
    location_id: ocean_surface
    time_of_day: "dark storm"
    action_prompt: "The stark horizon line is broken by chaos. A heavy geometric shape is sinking into the abyssal void below. Visual poetry of sacrifice."
    # --------------------
    dialogue_text: "A terrible storm wrecked the ship. The prince fell into the sea!"
    dialogue_text_zh: "一场可怕的风暴摧毁了船。王子掉进了海里！"
    after_success_text: "The little mermaid held him tight and swam to the shore."
    after_success_text_zh: "小美人鱼紧紧抱住他，向岸边游去。"
    characters:
      - id: prince_drowning
        img_src: assets/prince.svg
        label: Prince Drowning
        position: { x: "70%", y: "60%" }
        width: "120px"
        height: "120px"
        states:
          drowning: { filter: "brightness(0.7)", animation: "none" }
          saved: { filter: "brightness(1.5) drop-shadow(0 0 20px #fff)", animation: "item-bounce" }
        initial_state: drowning
    items:
      - id: mermaid_savior
        img_src: assets/mermaid.svg
        label: Mermaid Savior
        position: { x: "20%", y: "80%" }
        width: "140px"
        height: "140px"
        draggable: true
        animation: float-gentle
    interaction:
      type: drag_and_drop
      draggable_id: mermaid_savior
      target_id: prince_drowning
      hit_tolerance: 50
      on_success:
        actions:
          - { type: hide_item, target: mermaid_savior, animation: pop-vanish }
          - { type: change_state, target: prince_drowning, to_state: saved }
          - { type: play_dialogue, dialogue_id: after_feed }
          - { type: show_particles, emoji: "🌊", count: 12, duration_ms: 1500 }
    ending:
      auto_advance: true
      delay_after_success_ms: 5000

  - id: lm_s4_beach
    title_zh: 沙滩上的离别
    title_en: The Beach
    # --- AIGC Context ---
    location_id: sandy_beach
    time_of_day: "desaturated morning"
    action_prompt: "A heavy, stoic geometric shape lies washed up on the curved shore. In the distance, a half-transparent fluid silhouette watches in silence, fading."
    # --------------------
    dialogue_text: "She left him safely on the beach, watching from afar as he woke up."
    dialogue_text_zh: "她将他安全地放在沙滩上，在远处看着他醒来。"
    characters:
      - id: prince_sleeping
        img_src: assets/prince.svg
        label: Prince Sleeping
        position: { x: "40%", y: "70%" }
        width: "140px"
        height: "140px"
      - id: mermaid_hiding
        img_src: assets/mermaid.svg
        label: Mermaid Hiding
        position: { x: "85%", y: "65%" }
        width: "100px"
        height: "100px"
        states:
          hiding: { filter: "brightness(0.6) blur(2px)", animation: "none" }
        initial_state: hiding
    ending:
      title_en: "End of Chapter 1"
      title_zh: "第一章 · 完"
      subtitle_zh: "她的爱，如同泡沫般静默无声..."
      button_text: "重读本章"
      particles_emoji: "🫧"
